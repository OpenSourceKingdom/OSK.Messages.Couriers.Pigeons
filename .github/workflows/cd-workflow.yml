name: .NET Test Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  SOLUTION_FILE: ${{ github.event.repository.name }}.slnx

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Setup .NET Core SDK
      uses: actions/setup-dotnet@v5.0.1
      with:
        dotnet-version: 10.x

    - name: Restore dependencies
      run: >-
        dotnet restore ./src/${{ env.SOLUTION_FILE }}
    - name: Build
      run: dotnet build --no-restore ./src/${{ env.SOLUTION_FILE }}
    - name: Test
      run: dotnet test --no-build --verbosity normal ./src/${{ env.SOLUTION_FILE }}
